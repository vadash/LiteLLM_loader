router_settings:
  routing_strategy: "simple-shuffle"
  fallbacks:
    - claude-opus-4-6: ["fallback-1", "fallback-2", "fallback-3", "fallback-4", "fallback-5"]
  num_retries: 1
  enable_pre_call_checks: true

litellm_settings:
  allowed_fails: 2
  cooldown_time: 30
  callbacks: ["handler.custom_handler"]
