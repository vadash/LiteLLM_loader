router_settings:
  routing_strategy: "simple-shuffle"
  model_group_alias:
    FAST: qwen-122b
    SMART: glm50
  fallbacks:
    - FAST: ["qwen-80b", "kimi-k2-new", "kimi-k2-old", "cerebras", "longcat"]
    - SMART:
        [
          "glm47",
          "ds32",
          "ds31t",
          "ds31",
          "mistral",
          "qwen-coder",
          "cerebras",
          "qwen-122b",
          "qwen-80b",          
          "kimi-k2-new",
          "kimi-k2-old",
        ]
  num_retries: 1
  enable_pre_call_checks: true

litellm_settings:
  allowed_fails: 2        # Trigger cooldown after 2 failures within the cooldown window
  cooldown_time: 120      # Cooldown duration in seconds (2 minutes) after allowed_fails is hit
  callbacks: ["handler.custom_handler"] # Custom callback — handles empty response skipping
  set_verbose: false      # Disable verbose logging in production to eliminate serialization lag
  check_all_models: false # Skip global health checks on startup (avoids cold-start delays)
  enable_pre_call_checks: true # Re-enabled per-request: keeps cooldown logic active during calls
