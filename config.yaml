router_settings:
  routing_strategy: "latency-based-routing"
  routing_strategy_args:
    lowest_latency_buffer: 0.3

  fallbacks:
    - FAST: ["kimi2", "cerebras", "ds3x", "longcat", "qwen-coder"]
    - SMART: ["qwen3x", "cerebras", "ds3x", "qwen-coder", "longcat"]

  num_retries: 1
  enable_pre_call_checks: true
  allowed_fails: 2
  cooldown_time: 120

general_settings:
  background_health_checks: false

litellm_settings:
  callbacks: ["handler.custom_handler"]
  set_verbose: false
