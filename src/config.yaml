# LiteLLM Router Configuration for OpenVault
# ============================================
#
# PURPOSE: Route LLM requests across multiple low-cost public models with automatic
# fallback when models return garbage responses or timeout.
#
# GARBAGE DETECTION: handler.py detects training data leakage (PHP, HTML, Weibo
# templates, system prompt leaks) and marks deployments as dead for 10 minutes.
#
# VISUAL HIERARCHY:
#            FAST (user request)
#               |
#        +------+------+
#        |      |      |
#     qwen3x  kimi2  zai_glm47
#        |      |      |
#        +-kimi2  zai_glm47 longcat
#           |      |      |
#        zai_glm47 longcat qwen-coder
#           |      |      |
#        longcat qwen-coder cerebras
#           |      |
#        qwen-coder cerebras
#           |
#        cerebras
#
# IMPORTANT SETTINGS:
# - router_settings.cooldown_time: 600 (must match handler.py COOLDOWN_SECONDS)
# - router_settings.allowed_fails: 1
# - router_settings.allowed_fails_policy.InternalServerErrorAllowedFails: 1
# - litellm_settings.callbacks: ["handler.custom_handler"]
#
# LOGS: Check litellm.log for [GarbageResponseHandler] messages
#
model_list:
  # ── Individual models ────────────────────────────────────────────────────────
  - model_name: qwen-80b
    litellm_params:
      model: openai/nvidia:qwen/qwen3-next-80b-a3b-instruct
      api_base: os.environ/NVIDIA_API_BASE
      api_key: os.environ/NVIDIA_API_KEY
      extra_headers:
        User-Agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/146.0.0.0 Safari/537.36"

  - model_name: qwen-122b
    litellm_params:
      model: openai/nvidia:qwen/qwen3.5-122b-a10b
      api_base: os.environ/NVIDIA_API_BASE
      api_key: os.environ/NVIDIA_API_KEY
      extra_headers:
        User-Agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/146.0.0.0 Safari/537.36"

  - model_name: kimi-k2-new
    litellm_params:
      model: openai/nvidia:moonshotai/kimi-k2-instruct-0905
      api_base: os.environ/NVIDIA_API_BASE
      api_key: os.environ/NVIDIA_API_KEY
      extra_headers:
        User-Agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/146.0.0.0 Safari/537.36"

  - model_name: kimi-k2-old
    litellm_params:
      model: openai/nvidia:moonshotai/kimi-k2-instruct
      api_base: os.environ/NVIDIA_API_BASE
      api_key: os.environ/NVIDIA_API_KEY
      extra_headers:
        User-Agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/146.0.0.0 Safari/537.36"

  - model_name: cerebras
    litellm_params:
      model: openai/cerebras:qwen-3-235b-a22b-instruct-2507
      api_base: os.environ/NVIDIA_API_BASE
      api_key: os.environ/NVIDIA_API_KEY
      extra_headers:
        User-Agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/146.0.0.0 Safari/537.36"

  - model_name: longcat
    litellm_params:
      model: openai/longcat:LongCat-Flash-Chat
      api_base: os.environ/NVIDIA_API_BASE
      api_key: os.environ/NVIDIA_API_KEY
      extra_headers:
        User-Agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/146.0.0.0 Safari/537.36"

  - model_name: glm50
    litellm_params:
      model: openai/nvidia:z-ai/glm5
      api_base: os.environ/NVIDIA_API_BASE
      api_key: os.environ/NVIDIA_API_KEY
      extra_headers:
        User-Agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/146.0.0.0 Safari/537.36"

  - model_name: glm47
    litellm_params:
      model: openai/nvidia:z-ai/glm4.7
      api_base: os.environ/NVIDIA_API_BASE
      api_key: os.environ/NVIDIA_API_KEY
      extra_headers:
        User-Agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/146.0.0.0 Safari/537.36"

  - model_name: mistral
    litellm_params:
      model: openai/mistral:mistral
      api_base: os.environ/NVIDIA_API_BASE
      api_key: os.environ/NVIDIA_API_KEY
      extra_headers:
        User-Agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/146.0.0.0 Safari/537.36"

  - model_name: qwen-coder
    litellm_params:
      model: openai/qwen:coder-model
      api_base: os.environ/NVIDIA_API_BASE
      api_key: os.environ/NVIDIA_API_KEY
      extra_headers:
        User-Agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/146.0.0.0 Safari/537.36"

  - model_name: zai_glm47
    litellm_params:
      model: anthropic/claude-opus-4-6
      api_base: "https://api.z.ai/api/anthropic"
      api_key: os.environ/ZAI_API_KEY
      thinking:
        type: enabled
        budget_tokens: 2048

  - model_name: ali_glm50
    litellm_params:
      model: anthropic/glm-5
      api_base: os.environ/ALIBABA_API_BASE
      api_key: os.environ/ALIBABA_API_KEY
      thinking:
        type: enabled
        budget_tokens: 2048      

  # ── User-facing group: FAST = lowest latency of 2 Qwens ────────────────────
  - model_name: FAST
    litellm_params:
      model: openai/nvidia:qwen/qwen3-next-80b-a3b-instruct
      api_base: os.environ/NVIDIA_API_BASE
      api_key: os.environ/NVIDIA_API_KEY
      extra_headers:
        User-Agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/146.0.0.0 Safari/537.36"

  - model_name: FAST
    litellm_params:
      model: openai/nvidia:qwen/qwen3.5-122b-a10b
      api_base: os.environ/NVIDIA_API_BASE
      api_key: os.environ/NVIDIA_API_KEY
      extra_headers:
        User-Agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/146.0.0.0 Safari/537.36"

  # ── User-facing group: SMART = alias for zai_glm47 (Claude via z.ai) ─────────
  - model_name: SMART
    litellm_params:
      model: anthropic/claude-opus-4-6
      api_base: "https://api.z.ai/api/anthropic"
      api_key: os.environ/ZAI_API_KEY
      thinking:
        type: enabled
        budget_tokens: 2048

  # ── Reusable fallback groups ─────────────────────────────────────────────────
  - model_name: nvidia_glm
    litellm_params:
      model: openai/nvidia:z-ai/glm5
      api_base: os.environ/NVIDIA_API_BASE
      api_key: os.environ/NVIDIA_API_KEY
      extra_headers:
        User-Agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/146.0.0.0 Safari/537.36"

  - model_name: nvidia_glm
    litellm_params:
      model: openai/nvidia:z-ai/glm4.7
      api_base: os.environ/NVIDIA_API_BASE
      api_key: os.environ/NVIDIA_API_KEY
      extra_headers:
        User-Agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/146.0.0.0 Safari/537.36"

  - model_name: qwen3x
    litellm_params:
      model: openai/nvidia:qwen/qwen3-next-80b-a3b-instruct
      api_base: os.environ/NVIDIA_API_BASE
      api_key: os.environ/NVIDIA_API_KEY
      extra_headers:
        User-Agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/146.0.0.0 Safari/537.36"

  - model_name: qwen3x
    litellm_params:
      model: openai/nvidia:qwen/qwen3.5-122b-a10b
      api_base: os.environ/NVIDIA_API_BASE
      api_key: os.environ/NVIDIA_API_KEY
      extra_headers:
        User-Agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/146.0.0.0 Safari/537.36"

  - model_name: kimi2
    litellm_params:
      model: openai/nvidia:moonshotai/kimi-k2-instruct-0905
      api_base: os.environ/NVIDIA_API_BASE
      api_key: os.environ/NVIDIA_API_KEY
      extra_headers:
        User-Agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/146.0.0.0 Safari/537.36"

  - model_name: kimi2
    litellm_params:
      model: openai/nvidia:moonshotai/kimi-k2-instruct
      api_base: os.environ/NVIDIA_API_BASE
      api_key: os.environ/NVIDIA_API_KEY
      extra_headers:
        User-Agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/146.0.0.0 Safari/537.36"

router_settings:
  routing_strategy: "latency-based-routing"
  routing_strategy_args:
    lowest_latency_buffer: 0.3

  # ── Fallback behavior with groups ───────────────────────────────────────────
  # Groups can fallback to other groups, creating a chain.
  # Each group that appears in a fallback list must have its own fallbacks.
  # Chain: FAST → qwen3x → kimi2 → zai_glm47 → longcat → qwen-coder → cerebras
  fallbacks:
    # Main user-facing groups
    - FAST: ["kimi2", "zai_glm47", "longcat", "qwen-coder", "cerebras"]
    - SMART: ["qwen3x", "nvidia_glm", "kimi2", "qwen-coder", "cerebras", "longcat"]

    # Reusable fallback groups - each has its own fallback chain
    - qwen3x: ["kimi2", "zai_glm47", "longcat", "qwen-coder", "cerebras"]
    - nvidia_glm: ["qwen3x", "kimi2", "qwen-coder", "cerebras", "longcat"]
    - kimi2: ["zai_glm47", "longcat", "qwen-coder", "cerebras"]
    - zai_glm47: ["longcat", "qwen-coder", "cerebras"]
    - longcat: ["qwen-coder", "cerebras"]
    - qwen-coder: ["cerebras"]
    - cerebras: []
    - ali_glm50: []

  timeout: 180
  num_retries: 0
  enable_pre_call_checks: true
  allowed_fails: 1           # Mark as dead after 1 garbage response
  cooldown_time: 900         # Keep provider dead for 10 minutes (600 seconds)

  # ── Per-error-type cooldown thresholds ──────────────────────────────────────
  # InternalServerError = our garbage response trigger
  allowed_fails_policy:
    InternalServerErrorAllowedFails: 1      # Instant cooldown on garbage
    RateLimitErrorAllowedFails: 2           # More lenient on rate limits
    TimeoutErrorAllowedFails: 2             # Moderate tolerance for timeouts
    ContentPolicyViolationErrorAllowedFails: 5  # Don't kill for policy issues

general_settings:
  background_health_checks: false

litellm_settings:
  callbacks: ["handler.custom_handler"]
  set_verbose: false
  drop_params: true
