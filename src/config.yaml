router_settings:
  routing_strategy: "latency-based-routing"
  routing_strategy_args:
    lowest_latency_buffer: 0.3

  # ── Fallback behavior with groups ───────────────────────────────────────────
  # LiteLLM resolves fallbacks FLAT (not recursive): when FAST fails, the router
  # iterates FAST's list directly and never consults a fallback model's own chain.
  # Therefore every entry must list the full remaining tail of the priority order.
  fallbacks:
    # ── User-facing entry points ─────────────────────────────────────────────
    - FAST: ["kimi2", "zai_glm47_nothink", "ali_glm50_nothink", "longcat", "cerebras"]
    - SMART: ["qwen3x", "kimi2", "ali_glm50_think", "longcat", "cerebras"]

    # ── Reusable groups (needed only when called as direct primary model) ────
    - qwen3x: [] # terminal — suppresses per-request lookup warning
    - nvidia_glm: [] # terminal — suppresses per-request lookup warning
    - kimi2: [] # terminal — suppresses per-request lookup warning
    - zai_glm47_think: ["ali_glm50_think"] # terminal — suppresses per-request lookup warning
    - zai_glm47_nothink: ["ali_glm50_nothink"] # terminal — suppresses per-request lookup warning
    - longcat: [] # terminal — suppresses per-request lookup warning
    - qwen-coder: [] # terminal — suppresses per-request lookup warning
    - cerebras: [] # terminal — suppresses per-request lookup warning
    - ali_glm50_think: ["zai_glm47_think"] # terminal — suppresses per-request lookup warning
    - ali_glm50_nothink: ["zai_glm47_nothink"] # terminal — suppresses per-request lookup warning    

  timeout: 180
  num_retries: 0
  enable_pre_call_checks: true
  allowed_fails: 1 # Mark as dead after 1 garbage response
  cooldown_time: 600 # Keep provider dead for 10 minutes (600 seconds)

  # ── Per-error-type cooldown thresholds ──────────────────────────────────────
  # InternalServerError = our garbage response trigger
  # Defines how many times specific HTTP errors can occur before a model is put on cooldown and bypassed
  allowed_fails_policy:
    
    # Trips after 1 failure. Catches 500 errors, including the synthetic 500 errors injected by your custom handler.py when it detects garbage/refusals.
    InternalServerErrorAllowedFails: 1 
    
    # Trips after 1 failure. CRITICAL FOR KIMI2: Catches HTTP 400 errors (like NVIDIA rejecting a prompt for strict safety or context limits) so the fallback chain continues instead of halting.
    BadRequestErrorAllowedFails: 1  
    
    # Trips after 1 failure. CRITICAL FOR KIMI2: Catches HTTP 502 errors (Bad Gateway) which happens when the connection to the provider outright fails or drops.
    BadGatewayErrorAllowedFails: 1  
    
    # Trips after 2 failures. Gives the model a slight 2-strike buffer for temporary HTTP 429 rate limits before marking it as dead.
    RateLimitErrorAllowedFails: 2 
    
    # Trips after 2 failures. Allows a 2-strike grace period if a model is just temporarily congested and slow to respond.
    TimeoutErrorAllowedFails: 2 
    
    # Trips after 1 failure. If a provider explicitly flags the prompt for safety violations, instantly failover to the next (potentially less censored) model in the chain.
    ContentPolicyViolationErrorAllowedFails: 1

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  background_health_checks: false

litellm_settings:
  callbacks: ["handler.custom_handler"]
  set_verbose: false
  drop_params: true
  modify_params: true
