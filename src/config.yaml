# LiteLLM Router Configuration for OpenVault
# ============================================
#
# PURPOSE: Route LLM requests across multiple low-cost public models with automatic
# fallback when models return garbage responses or timeout.
#
# GARBAGE DETECTION: handler.py detects training data leakage (PHP, HTML, Weibo
# templates, system prompt leaks) and marks deployments as dead for 10 minutes.
#
# IMPORTANT SETTINGS:
# - router_settings.cooldown_time: 600 (must match handler.py COOLDOWN_SECONDS)
# - router_settings.allowed_fails: 1
# - router_settings.allowed_fails_policy.InternalServerErrorAllowedFails: 1
# - litellm_settings.callbacks: ["handler.custom_handler"]
#
# LOGS: Check litellm.log for [GarbageResponseHandler] messages
#
model_list:
# ── Individual models ────────────────────────────────────────────────────────

# ── User-facing groups ────────────────────
- model_name: FAST
  litellm_params:
    model: openai/gpt-3.5-turbo # known model ID → passes pre-call checks
    api_key: "x"
    mock_response: "error"
    drop_params: true

- model_name: SMART
  litellm_params:
    model: openai/gpt-3.5-turbo # known model ID → passes pre-call checks
    api_key: "x"
    mock_response: "error"
    drop_params: true

# ── Reusable fallback groups ─────────────────────────────────────────────────
- model_name: nvidia
  litellm_params:
    model: openai/qwen/qwen3-coder-480b-a35b-instruct
    api_base: os.environ/NVIDIA_PROXY_BASE1
    api_key: os.environ/NVIDIA_API_KEY1
    drop_params: true

- model_name: nvidia
  litellm_params:
    model: openai/nvidia/nemotron-3-super-120b-a12b
    api_base: os.environ/NVIDIA_PROXY_BASE2
    api_key: os.environ/NVIDIA_API_KEY2
    drop_params: true

- model_name: nvidia
  litellm_params:
    model: openai/qwen/qwen3.5-397b-a17b
    api_base: os.environ/NVIDIA_PROXY_BASE3
    api_key: os.environ/NVIDIA_API_KEY3
    drop_params: true

- model_name: gemma4
  litellm_params:
    model: openai/gemma-4-31b-it
    api_base: os.environ/GOOGLE_PROXY_BASE1
    api_key: os.environ/GOOGLE_API_KEY1
    drop_params: true
    additional_drop_params: [ "frequency_penalty", "presence_penalty", "do_sample" ]
    rpm: 5

- model_name: gemma4
  litellm_params:
    model: openai/gemma-4-31b-it
    api_base: os.environ/GOOGLE_PROXY_BASE2
    api_key: os.environ/GOOGLE_API_KEY2
    drop_params: true
    additional_drop_params: [ "frequency_penalty", "presence_penalty", "do_sample" ]
    rpm: 5

- model_name: gemma4
  litellm_params:
    model: openai/gemma-4-31b-it
    api_base: os.environ/GOOGLE_PROXY_BASE3
    api_key: os.environ/GOOGLE_API_KEY3
    drop_params: true
    additional_drop_params: [ "frequency_penalty", "presence_penalty", "do_sample" ]
    rpm: 5

- model_name: longcat
  litellm_params:
    model: openai/LongCat-Flash-Chat
    api_base: os.environ/LONGCAT_PROXY_BASE1
    api_key: os.environ/LONGCAT_API_KEY
    rpm: 10
    drop_params: true

- model_name: longcat2
  litellm_params:
    model: openai/LongCat-2.0-Preview
    api_base: os.environ/LONGCAT_PROXY_BASE1
    api_key: os.environ/LONGCAT_API_KEY
    rpm: 10
    drop_params: true

- model_name: longcat
  litellm_params:
    model: openai/LongCat-Flash-Lite
    api_base: os.environ/LONGCAT_PROXY_BASE1
    api_key: os.environ/LONGCAT_API_KEY
    rpm: 10
    drop_params: true

- model_name: zai
  litellm_params:
    model: anthropic/glm-4.7
    api_base: os.environ/ZAI_PROXY_BASE1
    api_key: os.environ/ZAI_API_KEY
    rpm: 10
    drop_params: true
    additional_drop_params: [ "frequency_penalty", "presence_penalty" ]

- model_name: zai
  litellm_params:
    model: anthropic/glm-5-turbo
    api_base: os.environ/ZAI_PROXY_BASE1
    api_key: os.environ/ZAI_API_KEY
    rpm: 10
    drop_params: true
    additional_drop_params: [ "frequency_penalty", "presence_penalty" ]

- model_name: zai51
  litellm_params:
    model: anthropic/glm-5.1
    api_base: os.environ/ZAI_PROXY_BASE1
    api_key: os.environ/ZAI_API_KEY
    rpm: 10
    supports_reasoning: true
    # Allow LiteLLM to accept these specific parameters for this model mapping
    supported_openai_params: [ "thinking", "clear_thinking" ]
    # Ensure they don't get accidentally dropped by standard drop_params logic
    additional_drop_params: [ "frequency_penalty", "presence_penalty" ]

- model_name: zai47
  litellm_params:
    model: anthropic/glm-4.7
    api_base: os.environ/ZAI_PROXY_BASE1
    api_key: os.environ/ZAI_API_KEY
    rpm: 10
    # Force LiteLLM to track and pass thinking/reasoning parameters
    supports_reasoning: true
    additional_drop_params: [ "frequency_penalty", "presence_penalty" ]

- model_name: zai_free
  litellm_params:
    model: anthropic/glm-4.7-flash
    api_base: os.environ/ZAI_PROXY_BASE1
    api_key: os.environ/ZAI_API_KEY
    rpm: 10
    drop_params: true
    additional_drop_params: [ "frequency_penalty", "presence_penalty" ]

- model_name: zai_free
  litellm_params:
    model: anthropic/glm-4.5-air
    api_base: os.environ/ZAI_PROXY_BASE1
    api_key: os.environ/ZAI_API_KEY
    rpm: 10
    drop_params: true
    additional_drop_params: [ "frequency_penalty", "presence_penalty" ]

- model_name: kimik25
  litellm_params:
    model: anthropic/kimi-k2.5
    api_base: os.environ/ALIBABA_PROXY_BASE1
    api_key: os.environ/ALIBABA_API_KEY
    rpm: 10
    # Force LiteLLM to track and pass thinking/reasoning parameters
    supports_reasoning: true
    additional_drop_params: [ "frequency_penalty", "presence_penalty" ]

router_settings:
  routing_strategy: "latency-based-routing"
  routing_strategy_args:
    lowest_latency_buffer: 0.3
  default_litellm_params:
    extra_headers:
      User-Agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/146.0.0.0 Safari/537.36"

  # ── Fallback behavior with groups ───────────────────────────────────────────
  # LiteLLM resolves fallbacks FLAT (not recursive): when FAST fails, the router
  # iterates FAST's list directly and never consults a fallback model's own chain.
  # Therefore every entry must list the full remaining tail of the priority order.
  fallbacks:
  # ── User-facing entry points ─────────────────────────────────────────────
  - FAST: [ "gemma4", "zai_free", "nvidia", "longcat", "zai" ]
  - SMART: [ "zai", "nvidia", "gemma4", "longcat" ]
  # ── Yep need to duplicate ────
  content_policy_fallbacks:
  - FAST: [ "gemma4", "zai_free", "nvidia", "longcat", "zai" ]
  - SMART: [ "zai", "nvidia", "gemma4", "longcat" ]

  # ── Reusable groups (needed only when called as direct primary model) ────
  - zai: []
  - nvidia: []
  - gemma4: []
  - longcat: []
  - zai_free: []
  - zai51: [ "zai47" ]
  - longcat2: []
  - kimik25: []
  - zai47: []

  timeout: 180
  num_retries: 0
  enable_pre_call_checks: false
  allowed_fails: 1 # Mark as dead after 1 garbage response
  cooldown_time: 600 # Keep provider dead for 10 minutes (600 seconds)

  # ── Per-error-type cooldown thresholds ──────────────────────────────────────
  # InternalServerError = our garbage response trigger
  # Defines how many times specific HTTP errors can occur before a model is put on cooldown and bypassed
  allowed_fails_policy:

    # Trips after 1 failure. Catches 500 errors, including the synthetic 500 errors injected by your custom handler.py when it detects garbage/refusals.
    InternalServerErrorAllowedFails: 1

    # Trips after 1 failure. CRITICAL FOR KIMI2: Catches HTTP 400 errors (like NVIDIA rejecting a prompt for strict safety or context limits) so the fallback chain continues instead of halting.
    BadRequestErrorAllowedFails: 1

    # Trips after 1 failure. CRITICAL FOR KIMI2: Catches HTTP 502 errors (Bad Gateway) which happens when the connection to the provider outright fails or drops.
    BadGatewayErrorAllowedFails: 1

    # Trips after 2 failures. Gives the model a slight 2-strike buffer for temporary HTTP 429 rate limits before marking it as dead.
    RateLimitErrorAllowedFails: 2

    # Trips after 2 failures. Allows a 2-strike grace period if a model is just temporarily congested and slow to respond.
    TimeoutErrorAllowedFails: 2

    # Trips after 1 failure. If a provider explicitly flags the prompt for safety violations, instantly failover to the next (potentially less censored) model in the chain.
    ContentPolicyViolationErrorAllowedFails: 1

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  background_health_checks: false

litellm_settings:
  callbacks: [ "handler.custom_handler" ]
  set_verbose: false
  # MUST BE FALSE: Allowing drop_params = true drops 'thinking' configurations!
  drop_params: false
  modify_params: true
  # MUST BE TRUE: Tells LiteLLM to translate Anthropic thinking blocks into OpenAI reasoning_content
  include_reasoning: true
  # Forces LiteLLM to pass non-standard parameters straight to the provider API
  force_extra_body: true
