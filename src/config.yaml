# ==============================================================================
# LiteLLM Router Configuration for OpenVault
# ==============================================================================
# This configuration file manages a highly resilient, load-balanced, and
# self-healing gateway that routes LLM requests across multiple backend providers.
#
# How Routing Works Here:
# 1. Clients may use virtual entry points such as FAST, SMART, CODE, or GOON.
# 2. LiteLLM model_group_alias resolves those names before deployment selection.
# 3. Transport failures use the router fallback chain; response-quality failures
#    receive one bounded retry from handler.py before reaching the client.
# 4. Deployment failures open a short circuit breaker, while model-level
#    refusals/format failures switch to the next provider group.
# ==============================================================================

model_list:
# ────────────────────────────────────────────────────────────────────────────
# 2. Reusable Fallback & Load-Balancing Groups
# ────────────────────────────────────────────────────────────────────────────
# When multiple entries share the same 'model_name', LiteLLM automatically groups
# them into a load-balanced pool. If one fails, LiteLLM tries the others.
# ────────────────────────────────────────────────────────────────────────────

